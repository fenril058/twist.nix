name: Unit tests

on:
  push:
    branches:
      - master
    paths:
      - 'flake.lock'
      - 'pkgs/build-support/**'
  pull_request:
    paths:
      - 'flake.lock'
      - 'pkgs/build-support/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31
        with:
          # nixpkgs channel is needed for the unit tests
          nix_path: nixpkgs=channel:nixos-unstable

      - run: nix flake update
        working-directory: pkgs/build-support/elisp

      - name: Run unit tests
        run: |
          set -euo pipefail

          tests=()
          while IFS= read -r -d '' test; do
            tests+=("$test")
          done < <(find pkgs/build-support -type f -name 'test*.nix' -print0)

          nix-instantiate --strict --eval --json "${tests[@]}" | jq
